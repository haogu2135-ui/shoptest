name: Deploy Backend Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BACKEND_DEPLOY_HOST: ${{ secrets.BACKEND_DEPLOY_HOST }}
      BACKEND_DEPLOY_USER: ${{ secrets.BACKEND_DEPLOY_USER }}
      BACKEND_DEPLOY_PASSWORD: ${{ secrets.BACKEND_DEPLOY_PASSWORD }}
      BACKEND_DEPLOY_PORT: ${{ secrets.BACKEND_DEPLOY_PORT }}
      BACKEND_DEPLOY_TARGET_DIR: ${{ secrets.BACKEND_DEPLOY_TARGET_DIR }}
      BACKEND_DEPLOY_SERVICE: ${{ secrets.BACKEND_DEPLOY_SERVICE }}
      BACKEND_REMOTE_TEMP_DIR: ${{ secrets.BACKEND_REMOTE_TEMP_DIR }}
      BACKEND_JAR_NAME: ${{ secrets.BACKEND_JAR_NAME }}
      BACKEND_DEPLOY_OWNER: ${{ secrets.BACKEND_DEPLOY_OWNER }}
      BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
      BACKEND_RUNTIME_ENV_FILE: ${{ secrets.BACKEND_RUNTIME_ENV_FILE }}
      BACKEND_SERVICE_USER: ${{ secrets.BACKEND_SERVICE_USER }}
      BACKEND_SERVICE_GROUP: ${{ secrets.BACKEND_SERVICE_GROUP }}
      BACKEND_JAVA_BIN: ${{ secrets.BACKEND_JAVA_BIN }}
      BACKEND_JAVA_OPTS: ${{ secrets.BACKEND_JAVA_OPTS }}
      BACKEND_REGISTER_SERVICE: ${{ secrets.BACKEND_REGISTER_SERVICE }}
      BACKEND_ENABLE_SERVICE: ${{ secrets.BACKEND_ENABLE_SERVICE }}
      BACKEND_HEALTHCHECK_RETRIES: ${{ secrets.BACKEND_HEALTHCHECK_RETRIES }}
      BACKEND_HEALTHCHECK_INTERVAL_SECONDS: ${{ secrets.BACKEND_HEALTHCHECK_INTERVAL_SECONDS }}
    steps:
      - name: Check deployment secrets
        id: preflight
        run: |
          missing=()
          if [[ -z "$BACKEND_DEPLOY_HOST" ]]; then missing+=("BACKEND_DEPLOY_HOST"); fi
          if [[ -z "$BACKEND_DEPLOY_USER" ]]; then missing+=("BACKEND_DEPLOY_USER"); fi
          if [[ -z "$BACKEND_DEPLOY_PASSWORD" ]]; then missing+=("BACKEND_DEPLOY_PASSWORD"); fi

          if (( ${#missing[@]} > 0 )); then
            echo "::warning::Skipping backend deployment. Missing GitHub Secrets: ${missing[*]}"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "BACKEND_DEPLOY_PORT=${BACKEND_DEPLOY_PORT:-22}" >> "$GITHUB_ENV"
          echo "BACKEND_DEPLOY_TARGET_DIR=${BACKEND_DEPLOY_TARGET_DIR:-/opt/shoptest}" >> "$GITHUB_ENV"
          echo "BACKEND_DEPLOY_SERVICE=${BACKEND_DEPLOY_SERVICE:-shoptest-backend}" >> "$GITHUB_ENV"
          echo "BACKEND_REMOTE_TEMP_DIR=${BACKEND_REMOTE_TEMP_DIR:-/tmp/shoptest-backend-deploy}" >> "$GITHUB_ENV"
          echo "BACKEND_JAR_NAME=${BACKEND_JAR_NAME:-shop.jar}" >> "$GITHUB_ENV"
          echo "BACKEND_RUNTIME_ENV_FILE=${BACKEND_RUNTIME_ENV_FILE:-/etc/shoptest/backend.env}" >> "$GITHUB_ENV"
          echo "BACKEND_SERVICE_USER=${BACKEND_SERVICE_USER:-shoptest}" >> "$GITHUB_ENV"
          echo "BACKEND_SERVICE_GROUP=${BACKEND_SERVICE_GROUP:-${BACKEND_SERVICE_USER:-shoptest}}" >> "$GITHUB_ENV"
          echo "BACKEND_JAVA_BIN=${BACKEND_JAVA_BIN:-/usr/bin/java}" >> "$GITHUB_ENV"
          echo "BACKEND_JAVA_OPTS=${BACKEND_JAVA_OPTS:--Xms128m -Xmx512m -XX:MaxMetaspaceSize=192m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8}" >> "$GITHUB_ENV"
          echo "BACKEND_REGISTER_SERVICE=${BACKEND_REGISTER_SERVICE:-true}" >> "$GITHUB_ENV"
          echo "BACKEND_ENABLE_SERVICE=${BACKEND_ENABLE_SERVICE:-true}" >> "$GITHUB_ENV"
          echo "BACKEND_HEALTHCHECK_RETRIES=${BACKEND_HEALTHCHECK_RETRIES:-10}" >> "$GITHUB_ENV"
          echo "BACKEND_HEALTHCHECK_INTERVAL_SECONDS=${BACKEND_HEALTHCHECK_INTERVAL_SECONDS:-3}" >> "$GITHUB_ENV"
          echo "deploy=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.preflight.outputs.deploy == 'true'
        uses: actions/checkout@v4

      - name: Setup Java
        if: steps.preflight.outputs.deploy == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Install deployment tools
        if: steps.preflight.outputs.deploy == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Build backend jar
        if: steps.preflight.outputs.deploy == 'true'
        run: |
          chmod +x mvnw
          ./mvnw -B -DskipTests package

      - name: Upload backend jar
        if: steps.preflight.outputs.deploy == 'true'
        run: |
          set -euo pipefail

          remote_quote() {
            printf "'%s'" "$(printf "%s" "$1" | sed "s/'/'\\\\''/g")"
          }

          REMOTE="${BACKEND_DEPLOY_USER}@${BACKEND_DEPLOY_HOST}"
          SSH_COMMAND="ssh -p ${BACKEND_DEPLOY_PORT} -o StrictHostKeyChecking=accept-new"
          REMOTE_TEMP_Q="$(remote_quote "$BACKEND_REMOTE_TEMP_DIR")"

          SSHPASS="$BACKEND_DEPLOY_PASSWORD" sshpass -e $SSH_COMMAND "$REMOTE" "mkdir -p ${REMOTE_TEMP_Q}"
          SSHPASS="$BACKEND_DEPLOY_PASSWORD" sshpass -e rsync -az --delay-updates \
            -e "$SSH_COMMAND" \
            target/shop-0.0.1-SNAPSHOT.jar "$REMOTE:$BACKEND_REMOTE_TEMP_DIR/$BACKEND_JAR_NAME.next"
          SSHPASS="$BACKEND_DEPLOY_PASSWORD" sshpass -e rsync -az --delay-updates \
            -e "$SSH_COMMAND" \
            scripts/backend-remote-activate.sh "$REMOTE:$BACKEND_REMOTE_TEMP_DIR/backend-remote-activate.sh"

      - name: Register and restart backend service
        if: steps.preflight.outputs.deploy == 'true'
        run: |
          set -euo pipefail

          remote_quote() {
            printf "'%s'" "$(printf "%s" "$1" | sed "s/'/'\\\\''/g")"
          }

          TARGET_DIR_Q="$(remote_quote "$BACKEND_DEPLOY_TARGET_DIR")"
          TEMP_DIR_Q="$(remote_quote "$BACKEND_REMOTE_TEMP_DIR")"
          JAR_NAME_Q="$(remote_quote "$BACKEND_JAR_NAME")"
          SERVICE_Q="$(remote_quote "$BACKEND_DEPLOY_SERVICE")"
          OWNER_Q="$(remote_quote "${BACKEND_DEPLOY_OWNER:-}")"
          HEALTHCHECK_Q="$(remote_quote "${BACKEND_HEALTHCHECK_URL:-}")"
          RUNTIME_ENV_FILE_Q="$(remote_quote "$BACKEND_RUNTIME_ENV_FILE")"
          SERVICE_USER_Q="$(remote_quote "$BACKEND_SERVICE_USER")"
          SERVICE_GROUP_Q="$(remote_quote "$BACKEND_SERVICE_GROUP")"
          JAVA_BIN_Q="$(remote_quote "$BACKEND_JAVA_BIN")"
          JAVA_OPTS_Q="$(remote_quote "$BACKEND_JAVA_OPTS")"
          REGISTER_SERVICE_Q="$(remote_quote "$BACKEND_REGISTER_SERVICE")"
          ENABLE_SERVICE_Q="$(remote_quote "$BACKEND_ENABLE_SERVICE")"
          HEALTHCHECK_RETRIES_Q="$(remote_quote "$BACKEND_HEALTHCHECK_RETRIES")"
          HEALTHCHECK_INTERVAL_Q="$(remote_quote "$BACKEND_HEALTHCHECK_INTERVAL_SECONDS")"
          ACTIVATE_SCRIPT_Q="$(remote_quote "$BACKEND_REMOTE_TEMP_DIR/backend-remote-activate.sh")"
          REMOTE_COMMAND="TARGET_DIR=${TARGET_DIR_Q} TEMP_DIR=${TEMP_DIR_Q} JAR_NAME=${JAR_NAME_Q} SERVICE_NAME=${SERVICE_Q} OWNER=${OWNER_Q} HEALTHCHECK_URL=${HEALTHCHECK_Q} RUNTIME_ENV_FILE=${RUNTIME_ENV_FILE_Q} SERVICE_USER=${SERVICE_USER_Q} SERVICE_GROUP=${SERVICE_GROUP_Q} JAVA_BIN=${JAVA_BIN_Q} JAVA_OPTS=${JAVA_OPTS_Q} REGISTER_SERVICE=${REGISTER_SERVICE_Q} ENABLE_SERVICE=${ENABLE_SERVICE_Q} HEALTHCHECK_RETRIES=${HEALTHCHECK_RETRIES_Q} HEALTHCHECK_INTERVAL_SECONDS=${HEALTHCHECK_INTERVAL_Q} bash ${ACTIVATE_SCRIPT_Q}"

          REMOTE="${BACKEND_DEPLOY_USER}@${BACKEND_DEPLOY_HOST}"
          SSHPASS="$BACKEND_DEPLOY_PASSWORD" sshpass -e \
            ssh -p "$BACKEND_DEPLOY_PORT" -o StrictHostKeyChecking=accept-new "$REMOTE" "$REMOTE_COMMAND"

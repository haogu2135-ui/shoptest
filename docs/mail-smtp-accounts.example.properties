# SMTP accounts are used for email login codes, profile email-change codes, and
# order status emails. Copy these settings into a private deployment config or
# set them as environment variables. Do not commit real mailbox passwords or
# application-specific codes.
app.mail.code-ttl-minutes=10
app.mail.resend-interval-seconds=60
app.mail.max-code-attempts=5
app.mail.cleanup-interval-ms=300000
app.mail.brand-name=ShopMX

# 163 / NetEase example
app.mail.accounts[0].host=smtp.163.com
app.mail.accounts[0].port=465
app.mail.accounts[0].username=your-163-mailbox@example.com
app.mail.accounts[0].password=your-163-authorization-code
app.mail.accounts[0].from=your-163-mailbox@example.com
app.mail.accounts[0].ssl=true
app.mail.accounts[0].starttls=false

# Gmail example
app.mail.accounts[1].host=smtp.gmail.com
app.mail.accounts[1].port=587
app.mail.accounts[1].username=your-gmail@gmail.com
app.mail.accounts[1].password=your-gmail-app-password
app.mail.accounts[1].from=your-gmail@gmail.com
app.mail.accounts[1].ssl=false
app.mail.accounts[1].starttls=true

# Add more accounts by continuing the index.
app.mail.accounts[2].host=smtp.example.com
app.mail.accounts[2].port=465
app.mail.accounts[2].username=no-reply@example.com
app.mail.accounts[2].password=another-app-password
app.mail.accounts[2].from=no-reply@example.com
app.mail.accounts[2].ssl=true
app.mail.accounts[2].starttls=false

# Development profile: local services and relaxed browser origins only.
app.runtime-mode=dev
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.cloud.nacos.discovery.enabled=${NACOS_DISCOVERY_ENABLED:false}
payment.simulation-enabled=${PAYMENT_SIMULATION_ENABLED:true}
payment.gateway-allow-local=${PAYMENT_GATEWAY_ALLOW_LOCAL:true}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
app.websocket.allowed-origin-patterns=${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:}
logging.level.com.example.shop=${APP_LOG_LEVEL:DEBUG}

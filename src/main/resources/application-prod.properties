# Production profile: fail closed unless deployment environment provides real secrets and endpoints.
app.runtime-mode=production
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
payment.simulation-enabled=${PAYMENT_SIMULATION_ENABLED:false}
payment.simulation-allow-production=false
payment.gateway-allow-local=false
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://pet.686888666.xyz}
app.websocket.allowed-origin-patterns=${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:https://pet.686888666.xyz}
spring.datasource.url=${DB_URL:}
spring.datasource.password=${DB_PASSWORD:}
spring.redis.password=${REDIS_PASSWORD:}
management.endpoint.health.show-details=never
logging.level.com.example.shop=${APP_LOG_LEVEL:INFO}

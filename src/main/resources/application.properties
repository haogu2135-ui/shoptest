# JWT Configuration
app.jwtSecret=${JWT_SECRET:your-secret-key-here}
app.jwtExpirationInMs=${JWT_EXPIRATION_MS:86400000}
# Required for POST /users/create-admin bootstrap. Leave blank to disable public admin creation.
admin.bootstrap-token=${ADMIN_BOOTSTRAP_TOKEN:}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/shop?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:84813378}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=8081
# CORS allows localhost plus private LAN origins by default so the storefront works
# from another device via IP:PORT during local testing. Override deployed domains
# through CORS_ALLOWED_ORIGIN_PATTERNS, for example: https://shop.example.com,https://admin.example.com
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://10.*:*,http://172.*:*,http://192.168.*:*}
app.websocket.allowed-origin-patterns=${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:}

# Real-time support chat safety limits
support.websocket.max-message-chars=${SUPPORT_WEBSOCKET_MAX_MESSAGE_CHARS:1200}

# Pet gallery uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
pet-gallery.upload-dir=uploads/pet-gallery
pet-gallery.public-path=/uploads/pet-gallery
pet-gallery.max-file-size-bytes=5242880
pet-gallery.max-photos-per-user=3
pet-gallery.max-photos-per-ip=3

# Product catalog read optimization
product.search-cache-ttl-ms=${PRODUCT_SEARCH_CACHE_TTL_MS:30000}
product.search-cache-max-entries=${PRODUCT_SEARCH_CACHE_MAX_ENTRIES:80}

# Schema Initialization
# Keep startup non-destructive. schema.sql contains historical demo seed data and must not
# run on every restart in a live store because it can clear catalog/cart/review data.
spring.sql.init.mode=never
spring.sql.init.platform=mysql
spring.sql.init.continue-on-error=true
spring.sql.init.encoding=UTF-8

# Logging Configuration
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.shop.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 日志配置
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG_LEVEL:WARN}
logging.level.com.example.shop.mapper=${MYBATIS_MAPPER_LOG_LEVEL:INFO}

###debug=true

# Runtime mode: production, debug, dev or test. Default stays production-safe.
app.runtime-mode=${APP_RUNTIME_MODE:production}

# Payment Configuration
payment.timeout-minutes=30
payment.expiry-scan-ms=60000
payment.callback-secret=${PAYMENT_CALLBACK_SECRET:dev-payment-secret}
payment.supported-channels=STRIPE,MERCADO_PAGO,OXXO,SPEI,CODI,MX_LOCAL_CARD,ALIPAY,WECHAT_PAY,UNIONPAY,PAYPAL,APPLE_PAY,GOOGLE_PAY,VISA,SHOP_PAY
# For non-Stripe gateways, point this to the provider-hosted checkout/reference page base URL.
payment.checkout-base-url=${PAYMENT_CHECKOUT_BASE_URL:https://pay.example.local/checkout}
payment.default-currency=MXN
# Optional override. Defaults to disabled; debug/dev/test can opt in explicitly.
payment.simulation-enabled=${PAYMENT_SIMULATION_ENABLED:false}
# Defense-in-depth: production mode ignores payment simulation unless this is explicitly true.
payment.simulation-allow-production=${PAYMENT_SIMULATION_ALLOW_PRODUCTION:false}

# Payment channels are configuration-driven. Set enabled=false to hide a channel, or replace
# checkout-url/provider/refund-mode when connecting a real gateway without changing code.

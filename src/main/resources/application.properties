# JWT Configuration
app.jwtSecret=your-secret-key-here
app.jwtExpirationInMs=86400000

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/shop?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=root
spring.datasource.password=84813378
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=8081

# Schema Initialization
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.continue-on-error=true
spring.sql.init.encoding=UTF-8

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.shop.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 日志配置
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.example.shop.mapper=DEBUG

###debug=true

# Payment Configuration
payment.timeout-minutes=30
payment.expiry-scan-ms=60000
payment.callback-secret=dev-payment-secret
payment.supported-channels=STRIPE,SHOP_PAY,PAYPAL,APPLE_PAY,GOOGLE_PAY,VISA,MX_LOCAL_CARD,SPEI,OXXO,ALIPAY,WECHAT

# Stripe Checkout for Mexico.
# Use environment variables in production:
# STRIPE_SECRET_KEY=sk_live_...
# STRIPE_WEBHOOK_SECRET=whsec_...
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.checkout-success-url=${STRIPE_SUCCESS_URL:http://localhost:3000/profile?payment=success}
stripe.checkout-cancel-url=${STRIPE_CANCEL_URL:http://localhost:3000/cart?payment=cancelled}
stripe.checkout-expire-minutes=1440

# Order timeout cleanup
order.unpaid-timeout-minutes=30
order.expiry-scan-ms=60000
order.default-shipping-fee=30.00

# Legacy backend logistics provider integration.
# The storefront now uses the free 17TRACK embedded widget, so keep these empty unless
# you intentionally re-enable server-side tracking later.
# Example: logistics.api-url=https://provider.example/track?trackingNumber={trackingNumber}&carrier={carrier}&apiKey={apiKey}
logistics.api-url=
logistics.api-key=

# Kuaidi100 server-side tracking is disabled by default for the zero-cost 17TRACK widget flow.
# If enabled, Kuaidi100 Global is preferred for shipments whose order shipping address is in China.
# Carrier should be a Kuaidi100 company code when available, e.g. shunfeng, ems, yuantong, zhongtong.
kuaidi100.enabled=false
kuaidi100.query-url=https://poll.kuaidi100.com/poll/query.do
kuaidi100.customer=${KUAIDI100_CUSTOMER:}
kuaidi100.key=${KUAIDI100_KEY:}
kuaidi100.default-com=${KUAIDI100_DEFAULT_COM:auto}
kuaidi100.lang=zh_CN

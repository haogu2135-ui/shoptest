<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>服务器错误</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .error-container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #e74c3c;
        }
        .error-message {
            color: #666;
            margin: 20px 0;
        }
        .back-link {
            color: #3498db;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>500 - 服务器内部错误</h1>
        <div class="error-message">
            抱歉，服务器遇到了一个错误。请稍后再试。
        </div>
        <a href="/" class="back-link">返回首页</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - MyShop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="brand">
            <div class="brand-name">MyShop</div>
            <div class="brand-sub">创建您的账号，开始购物</div>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/api/users/register}" method="post" id="registerForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="3-20位字符" required minlength="3" maxlength="20" autofocus>
            </div>

            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱" required>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-with-action">
                    <input type="password" id="password" name="password" placeholder="至少 8 位，包含字母与数字" required minlength="8">
                    <button type="button" class="input-action-btn" data-target="password" title="显示/隐藏">👁</button>
                </div>
                <div class="pwd-strength" id="pwdStrength">
                    <div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div>
                </div>
                <div class="pwd-strength-label" id="pwdLabel"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <div class="input-with-action">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" required>
                    <button type="button" class="input-action-btn" data-target="confirmPassword" title="显示/隐藏">👁</button>
                </div>
                <div id="matchHint" style="font-size:0.78rem;margin-top:4px;height:1em;"></div>
            </div>

            <label class="checkbox-row" style="margin-bottom:1rem;">
                <input type="checkbox" id="agreeTerms" required>
                <span>我已阅读并同意 <a href="#">用户协议</a> 与 <a href="#">隐私政策</a></span>
            </label>

            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>

        <div class="auth-footer">
            已有账号？<a th:href="@{/login}">立即登录</a>
        </div>
    </div>

    <script>
        // 密码显隐
        document.querySelectorAll('.input-action-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const isPwd = input.type === 'password';
                input.type = isPwd ? 'text' : 'password';
                btn.textContent = isPwd ? '🙈' : '👁';
            });
        });

        // 密码强度评估
        const pwd = document.getElementById('password');
        const strengthBox = document.getElementById('pwdStrength');
        const labelEl = document.getElementById('pwdLabel');
        const labels = ['', '弱', '中', '强', '非常强'];
        const classes = ['', 'weak', 'medium', 'strong', 'very-strong'];

        function evaluate(p) {
            let s = 0;
            if (p.length >= 8) s++;
            if (/[A-Z]/.test(p) && /[a-z]/.test(p)) s++;
            if (/\d/.test(p)) s++;
            if (/[^A-Za-z0-9]/.test(p)) s++;
            return Math.min(s, 4);
        }

        pwd.addEventListener('input', () => {
            const score = pwd.value ? evaluate(pwd.value) : 0;
            strengthBox.className = 'pwd-strength ' + classes[score];
            labelEl.className = 'pwd-strength-label ' + classes[score];
            labelEl.textContent = labels[score] || '';
        });

        // 密码匹配实时提示
        const confirmPwd = document.getElementById('confirmPassword');
        const matchHint = document.getElementById('matchHint');
        function checkMatch() {
            if (!confirmPwd.value) { matchHint.textContent = ''; return; }
            if (confirmPwd.value === pwd.value) {
                matchHint.textContent = '✓ 密码一致';
                matchHint.style.color = 'var(--success)';
            } else {
                matchHint.textContent = '✗ 两次密码不一致';
                matchHint.style.color = 'var(--danger)';
            }
        }
        confirmPwd.addEventListener('input', checkMatch);
        pwd.addEventListener('input', checkMatch);

        // 提交校验
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            if (pwd.value !== confirmPwd.value) {
                e.preventDefault();
                matchHint.textContent = '✗ 两次密码不一致';
                matchHint.style.color = 'var(--danger)';
                confirmPwd.focus();
            }
        });
    </script>
</body>
</html>

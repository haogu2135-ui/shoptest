<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - MyShop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="brand">
            <div class="brand-name">MyShop</div>
            <div class="brand-sub">欢迎回来，请登录您的账号</div>
        </div>

        <div th:if="${param.error}" class="alert alert-error">用户名或密码错误，请重试</div>
        <div th:if="${param.logout}" class="alert alert-success">您已成功退出登录</div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-with-action">
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                    <button type="button" class="input-action-btn" id="togglePwd" title="显示/隐藏密码">👁</button>
                </div>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
                <label class="checkbox-row">
                    <input type="checkbox" name="remember-me">
                    <span>记住我</span>
                </label>
                <a href="#" style="font-size:0.85rem;">忘记密码？</a>
            </div>

            <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>

        <div class="divider">其他登录方式</div>
        <div class="social-buttons">
            <button type="button" class="social-btn" title="微信登录">💬</button>
            <button type="button" class="social-btn" title="QQ登录">🐧</button>
            <button type="button" class="social-btn" title="微博登录">📱</button>
        </div>

        <div class="auth-footer">
            还没有账号？<a th:href="@{/api/users/register}">立即注册</a>
        </div>
    </div>

    <script>
        const pwd = document.getElementById('password');
        const toggle = document.getElementById('togglePwd');
        toggle.addEventListener('click', () => {
            const isPwd = pwd.type === 'password';
            pwd.type = isPwd ? 'text' : 'password';
            toggle.textContent = isPwd ? '🙈' : '👁';
        });
    </script>
</body>
</html>

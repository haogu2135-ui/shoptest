server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:framework}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:shop-backend}
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${NACOS_REGISTER_ENABLED:${spring.cloud.nacos.discovery.enabled:true}}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        cluster-name: ${NACOS_CLUSTER_NAME:DEFAULT}
        service: ${NACOS_SERVICE_NAME:${spring.application.name}}
        ip: ${NACOS_DISCOVERY_IP:${NACOS_IP:}}
        port: ${NACOS_DISCOVERY_PORT:${NACOS_PORT:${SERVER_PORT:8081}}}
        ephemeral: ${NACOS_EPHEMERAL:true}
        weight: ${NACOS_WEIGHT:1}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        metadata:
          app: shop
          version: ${APP_VERSION:0.0.1-SNAPSHOT}
          management.context-path: /actuator
          runtime-mode: ${APP_RUNTIME_MODE:production}
          region: ${NACOS_METADATA_REGION:default}
          zone: ${NACOS_METADATA_ZONE:default}
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:shop}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: ${DB_HIKARI_MINIMUM_IDLE:5}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT_MS:10000}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME_MS:1800000}

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:2000ms}

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    jwt:
      secret: ${JWT_SECRET:}
      expiration: ${JWT_EXPIRATION_MS:86400000}

app:
  storefront-base-url: ${STOREFRONT_BASE_URL:https://pet.686888666.xyz}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://pet.686888666.xyz,http://localhost:*,http://127.0.0.1:*}
  websocket:
    allowed-origin-patterns: ${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:}

observability:
  request-latency:
    enabled: ${OBSERVABILITY_REQUEST_LATENCY_ENABLED:true}
  slow-request:
    api-threshold-ms: ${OBSERVABILITY_SLOW_REQUEST_API_THRESHOLD_MS:1000}
    admin-threshold-ms: ${OBSERVABILITY_SLOW_REQUEST_ADMIN_THRESHOLD_MS:5000}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.shop.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    name: ${LOG_FILE_NAME:logs/shop-backend.log}
  level:
    com.example.shop: ${APP_LOG_LEVEL:INFO}

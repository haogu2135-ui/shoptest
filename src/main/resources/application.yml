server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:shop-backend}
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${NACOS_REGISTER_ENABLED:${spring.cloud.nacos.discovery.enabled:true}}
        server-addr: ${NACOS_SERVER_ADDR:158.101.11.223:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        cluster-name: ${NACOS_CLUSTER_NAME:DEFAULT}
        service: ${NACOS_SERVICE_NAME:${spring.application.name}}
        ip: ${NACOS_DISCOVERY_IP:${NACOS_IP:}}
        port: ${NACOS_DISCOVERY_PORT:${NACOS_PORT:${SERVER_PORT:8081}}}
        ephemeral: ${NACOS_EPHEMERAL:true}
        weight: ${NACOS_WEIGHT:1}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        metadata:
          app: shop
          version: ${APP_VERSION:0.0.1-SNAPSHOT}
          management.context-path: /actuator
          runtime-mode: ${APP_RUNTIME_MODE:production}
          region: ${NACOS_METADATA_REGION:default}
          zone: ${NACOS_METADATA_ZONE:default}
  datasource:
    url: ${DB_URL:jdbc:mysql://158.101.11.223:3306/shop?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:shop}
    password: ${DB_PASSWORD:shop_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  redis:
    host: ${REDIS_HOST:158.101.11.223}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:shop_redis_password}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:2000ms}

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    jwt:
      secret: ${JWT_SECRET:}
      expiration: ${JWT_EXPIRATION_MS:86400000}

app:
  storefront-base-url: ${STOREFRONT_BASE_URL:https://pet.686888666.xyz}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://pet.686888666.xyz,http://localhost:*,http://127.0.0.1:*,http://10.*:*,http://172.*:*,http://192.168.*:*}
  websocket:
    allowed-origin-patterns: ${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:https://pet.686888666.xyz}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.shop.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    name: ${LOG_FILE_NAME:logs/shop-backend.log}
  level:
    com.example.shop: ${APP_LOG_LEVEL:INFO}

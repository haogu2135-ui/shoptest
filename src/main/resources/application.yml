server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/shop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  flyway:
    enabled: false
  
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-local-env}
      expiration: 86400000 # 24小时

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.shop.model
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.shop: DEBUG 

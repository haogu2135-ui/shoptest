# 支付宝配置
alipay.gateway-url=https://openapi.alipaydev.com/gateway.do
alipay.app-id=你的支付宝应用ID
alipay.merchant-private-key=你的商户私钥
alipay.alipay-public-key=支付宝公钥


# 163 / NetEase example
app.mail.accounts[0].host=smtp.163.com
app.mail.accounts[0].port=465
app.mail.accounts[0].username=your-163-mailbox@example.com
app.mail.accounts[0].password=your-163-authorization-code
app.mail.accounts[0].from=your-163-mailbox@example.com
app.mail.accounts[0].ssl=true
app.mail.accounts[0].starttls=false

# Gmail example
app.mail.accounts[1].host=smtp.gmail.com
app.mail.accounts[1].port=587
app.mail.accounts[1].username=your-gmail@gmail.com
app.mail.accounts[1].password=your-gmail-app-password
app.mail.accounts[1].from=your-gmail@gmail.com
app.mail.accounts[1].ssl=false
app.mail.accounts[1].starttls=true
 
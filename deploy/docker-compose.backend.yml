services:
  shoptest-backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    image: shoptest-backend:latest
    container_name: shoptest-backend
    restart: unless-stopped
    env_file:
      - ./backend.env
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:${BACKEND_HOST_PORT:-8081}:8081"
    volumes:
      - ../uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

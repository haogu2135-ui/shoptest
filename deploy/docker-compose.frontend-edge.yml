services:
  shoptest-frontend:
    image: nginx:1.27-alpine
    container_name: shoptest-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_NAME: ${SERVER_NAME:-pet.686888666.xyz}
      CANONICAL_SERVER_NAME: ${CANONICAL_SERVER_NAME:-pet.686888666.xyz}
      CANONICAL_REDIRECT_NAMES: ${CANONICAL_REDIRECT_NAMES:-www.pet.686888666.xyz}
      HTTPS_LISTEN_PORT: ${HTTPS_LISTEN_PORT:-443}
      SSL_CERTIFICATE: ${SSL_CERTIFICATE:-/etc/nginx/ssl/pet.686888666.xyz.crt}
      SSL_CERTIFICATE_KEY: ${SSL_CERTIFICATE_KEY:-/etc/nginx/ssl/pet.686888666.xyz.key}
      BACKEND_ORIGIN: ${BACKEND_ORIGIN:?BACKEND_ORIGIN is required}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-6m}
    volumes:
      - ../artifacts/frontend-build:/usr/share/nginx/html:ro
      - ./nginx/shoptest-edge.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${SSL_CERTIFICATE_HOST_PATH:-/etc/nginx/ssl/pet.686888666.xyz.crt}:${SSL_CERTIFICATE:-/etc/nginx/ssl/pet.686888666.xyz.crt}:ro
      - ${SSL_CERTIFICATE_KEY_HOST_PATH:-/etc/nginx/ssl/pet.686888666.xyz.key}:${SSL_CERTIFICATE_KEY:-/etc/nginx/ssl/pet.686888666.xyz.key}:ro

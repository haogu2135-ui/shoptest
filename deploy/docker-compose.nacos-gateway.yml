services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: shop-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:?NACOS_AUTH_TOKEN is required}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:?NACOS_AUTH_IDENTITY_KEY is required}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:?NACOS_AUTH_IDENTITY_VALUE is required}
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "${NACOS_BIND_IP:-127.0.0.1}:8848:8848"
      - "${NACOS_BIND_IP:-127.0.0.1}:9848:9848"
      - "${NACOS_BIND_IP:-127.0.0.1}:9849:9849"

  redis:
    image: redis:7-alpine
    container_name: shop-redis
    restart: unless-stopped
    env_file:
      - ./backend.env
    command: sh -c 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    expose:
      - "6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    image: shoptest-backend:latest
    container_name: shop-backend
    restart: unless-stopped
    env_file:
      - ./backend.env
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:${BACKEND_HOST_PORT:-8081}:8081"
    volumes:
      - ../uploads:/app/uploads
    depends_on:
      - nacos
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gateway:
    build:
      context: ..
      dockerfile: deploy/gateway.Dockerfile
    image: shop-gateway:latest
    container_name: shop-gateway
    restart: unless-stopped
    env_file:
      - ./gateway.env
    ports:
      - "${GATEWAY_BIND_IP:-127.0.0.1}:${GATEWAY_HOST_PORT:-8080}:8080"
    depends_on:
      - nacos
      - backend

volumes:
  redis-data:
